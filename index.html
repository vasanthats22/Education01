<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Loading - Education</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* FULLY RESPONSIVE 3D PRELOADER */
        .preloader-education {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #0a2b3e 0%, #0d1f2d 50%, #051a2a 100%);
            z-index: 99999;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.8s ease, visibility 0.8s ease;
            overflow: hidden;
        }

        .preloader-education.fade-out {
            opacity: 0;
            visibility: hidden;
        }

        /* Responsive Container */
        .preloader-inner {
            text-align: center;
            padding: 20px;
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
        }

        /* 3D Cube Container - Responsive Sizing */
        .cube-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 30px;
        }

        .cube-container {
            width: min(180px, 40vw);
            height: min(180px, 40vw);
            position: relative;
            transform-style: preserve-3d;
            animation: rotateCube 6s linear infinite;
        }

        /* Responsive Cube Faces */
        .cube-face {
            position: absolute;
            width: 100%;
            height: 100%;
            background: rgba(255,200,87,0.12);
            border: 2px solid #ffc857;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(4px);
            box-shadow: 0 0 20px rgba(255,200,87,0.2);
            transition: all 0.3s ease;
        }

        /* Cube Face Content - Education Icons */
        .cube-face i {
            font-size: clamp(32px, 8vw, 60px);
            color: #ffc857;
        }

        .cube-face .education-text {
            font-size: clamp(24px, 6vw, 48px);
            font-weight: 800;
            font-family: 'Inter', sans-serif;
            color: #ffc857;
        }

        /* Cube Positions - Responsive */
        .front  { transform: translateZ(calc(50%)); }
        .back   { transform: rotateY(180deg) translateZ(calc(50%)); }
        .right  { transform: rotateY(90deg) translateZ(calc(50%)); }
        .left   { transform: rotateY(-90deg) translateZ(calc(50%)); }
        .top    { transform: rotateX(90deg) translateZ(calc(50%)); }
        .bottom { transform: rotateX(-90deg) translateZ(calc(50%)); }

        /* Center Logo inside Cube */
        .center-logo {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 40%;
            height: 40%;
            background: rgba(10,43,62,0.9);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,200,87,0.5);
        }

        .center-logo img {
            width: 70%;
            height: auto;
            object-fit: contain;
        }

        /* Education Brand Name */
        .education-brand {
            margin-top: 40px;
            text-align: center;
        }

        .brand-name {
            font-family: 'Inter', sans-serif;
            font-size: clamp(32px, 7vw, 52px);
            font-weight: 800;
            background: linear-gradient(120deg, #FFE6B0, #ffc857, #FFE6B0);
            background-size: 200% auto;
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            animation: shineText 3s linear infinite;
            letter-spacing: clamp(3px, 1.5vw, 6px);
        }

        .brand-tagline {
            font-family: 'Inter', sans-serif;
            font-size: clamp(11px, 3vw, 14px);
            color: rgba(255,255,255,0.5);
            margin-top: 12px;
            letter-spacing: 2px;
            word-spacing: 4px;
        }

        /* Loading Bar - Responsive */
        .loading-section {
            margin-top: 40px;
            width: 100%;
            max-width: 280px;
            margin-left: auto;
            margin-right: auto;
        }

        .progress-bar-container {
            width: 100%;
            height: 3px;
            background: rgba(255,255,255,0.1);
            border-radius: 3px;
            overflow: hidden;
            position: relative;
        }

        .progress-fill {
            position: absolute;
            top: 0;
            left: 0;
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #ffc857, #ff6b6b, #4ecdc4);
            border-radius: 3px;
            animation: fillProgress 2.5s ease forwards;
        }

        .loading-text {
            display: flex;
            justify-content: space-between;
            margin-top: 12px;
            font-family: 'Inter', sans-serif;
            font-size: clamp(11px, 3vw, 13px);
            color: rgba(255,255,255,0.6);
        }

        .percentage {
            color: #ffc857;
            font-weight: 600;
        }

        /* Floating Particles */
        .particle {
            position: absolute;
            background: rgba(255,200,87,0.4);
            border-radius: 50%;
            pointer-events: none;
            animation: floatParticle linear infinite;
        }

        /* Education Icons Floating */
        .edu-icon {
            position: absolute;
            opacity: 0.15;
            font-size: clamp(20px, 5vw, 40px);
            color: #ffc857;
            animation: floatIcon linear infinite;
            pointer-events: none;
        }

        /* Animations */
        @keyframes rotateCube {
            0% { transform: rotateX(0deg) rotateY(0deg) rotateZ(0deg); }
            100% { transform: rotateX(360deg) rotateY(360deg) rotateZ(360deg); }
        }

        @keyframes shineText {
            0% { background-position: 0% 50%; }
            100% { background-position: 200% 50%; }
        }

        @keyframes fillProgress {
            0% { width: 0%; }
            20% { width: 15%; }
            40% { width: 35%; }
            60% { width: 65%; }
            80% { width: 85%; }
            100% { width: 100%; }
        }

        @keyframes floatParticle {
            0% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 0.6;
            }
            90% {
                opacity: 0.6;
            }
            100% {
                transform: translateY(-100vh) rotate(360deg);
                opacity: 0;
            }
        }

        @keyframes floatIcon {
            0% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }
            20% {
                opacity: 0.15;
            }
            80% {
                opacity: 0.15;
            }
            100% {
                transform: translateY(-100vh) rotate(360deg);
                opacity: 0;
            }
        }

        /* Responsive Cube Translate Fix */
        @media (min-width: 1200px) {
            .cube-container {
                width: 200px;
                height: 200px;
            }
            .front  { transform: translateZ(100px); }
            .back   { transform: rotateY(180deg) translateZ(100px); }
            .right  { transform: rotateY(90deg) translateZ(100px); }
            .left   { transform: rotateY(-90deg) translateZ(100px); }
            .top    { transform: rotateX(90deg) translateZ(100px); }
            .bottom { transform: rotateX(-90deg) translateZ(100px); }
        }

        @media (max-width: 1199px) and (min-width: 768px) {
            .cube-container {
                width: 160px;
                height: 160px;
            }
            .front  { transform: translateZ(80px); }
            .back   { transform: rotateY(180deg) translateZ(80px); }
            .right  { transform: rotateY(90deg) translateZ(80px); }
            .left   { transform: rotateY(-90deg) translateZ(80px); }
            .top    { transform: rotateX(90deg) translateZ(80px); }
            .bottom { transform: rotateX(-90deg) translateZ(80px); }
        }

        @media (max-width: 767px) {
            .cube-container {
                width: 130px;
                height: 130px;
            }
            .front  { transform: translateZ(65px); }
            .back   { transform: rotateY(180deg) translateZ(65px); }
            .right  { transform: rotateY(90deg) translateZ(65px); }
            .left   { transform: rotateY(-90deg) translateZ(65px); }
            .top    { transform: rotateX(90deg) translateZ(65px); }
            .bottom { transform: rotateX(-90deg) translateZ(65px); }
        }

        @media (max-width: 480px) {
            .cube-container {
                width: 110px;
                height: 110px;
            }
            .front  { transform: translateZ(55px); }
            .back   { transform: rotateY(180deg) translateZ(55px); }
            .right  { transform: rotateY(90deg) translateZ(55px); }
            .left   { transform: rotateY(-90deg) translateZ(55px); }
            .top    { transform: rotateX(90deg) translateZ(55px); }
            .bottom { transform: rotateX(-90deg) translateZ(55px); }
        }

        /* Hide scrollbar during preloader */
        body.preloader-active {
            overflow: hidden;
        }
    </style>
</head>
<body>

    <div class="preloader-education" id="preloaderEducation">
        <!-- Floating Educational Icons -->
        <div class="edu-icon" style="top: 10%; left: 5%; animation-duration: 12s; animation-delay: 0s;"><i class="fas fa-graduation-cap"></i></div>
        <div class="edu-icon" style="top: 20%; right: 8%; animation-duration: 14s; animation-delay: 2s;"><i class="fas fa-book"></i></div>
        <div class="edu-icon" style="bottom: 15%; left: 10%; animation-duration: 11s; animation-delay: 1s;"><i class="fas fa-chalkboard-user"></i></div>
        <div class="edu-icon" style="bottom: 25%; right: 12%; animation-duration: 13s; animation-delay: 3s;"><i class="fas fa-laptop-code"></i></div>
        <div class="edu-icon" style="top: 50%; left: 3%; animation-duration: 15s; animation-delay: 0.5s;"><i class="fas fa-brain"></i></div>
        <div class="edu-icon" style="top: 60%; right: 5%; animation-duration: 10s; animation-delay: 2.5s;"><i class="fas fa-certificate"></i></div>

        <!-- Floating Particles -->
        <div id="particles"></div>

        <div class="preloader-inner">
            <!-- 3D Cube with Education Theme -->
            <div class="cube-wrapper">
                <div class="cube-container">
                    <div class="cube-face front"><i class="fas fa-graduation-cap"></i></div>
                    <div class="cube-face back"><i class="fas fa-book-open"></i></div>
                    <div class="cube-face right"><span class="education-text">E</span></div>
                    <div class="cube-face left"><span class="education-text">D</span></div>
                    <div class="cube-face top"><i class="fas fa-chalkboard"></i></div>
                    <div class="cube-face bottom"><i class="fas fa-award"></i></div>
                    <div class="center-logo">
                        <img src="logo2.webp" alt="Education Logo" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 100 100%27%3E%3Crect width=%27100%27 height=%27100%27 fill=%27%23ffc857%27/%3E%3Ctext x=%2750%27 y=%2755%27 text-anchor=%27middle%27 font-size=%2750%27 fill=%27%230a2b3e%27 font-weight=%27bold%27 font-family=%27Inter%27%3EE%3C/text%3E%3C/svg%3E';">
                    </div>
                </div>
            </div>

            <!-- Education Brand Name -->
            <div class="education-brand">
                <div class="brand-name">EDUCATION</div>
                <div class="brand-tagline">empowering minds • shaping futures</div>
            </div>

            <!-- Loading Progress -->
            <div class="loading-section">
                <div class="progress-bar-container">
                    <div class="progress-fill"></div>
                </div>
                <div class="loading-text">
                    <span id="loadingMessage">Preparing your learning experience</span>
                    <span class="percentage" id="percentageCount">0%</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        (function() {
            const preloader = document.getElementById('preloaderEducation');
            const percentageSpan = document.getElementById('percentageCount');
            const messageSpan = document.getElementById('loadingMessage');
            
            // Loading messages for education theme
            const loadingMessages = [
                'Loading educational resources',
                'Preparing AI learning paths',
                'Setting up your dashboard',
                'Loading course materials',
                'Almost ready to learn',
                'Welcome to Education'
            ];
            
            let percentage = 0;
            let msgIndex = 0;
            
            // Animate percentage counter
            const percentageInterval = setInterval(() => {
                if (percentage < 100) {
                    percentage += Math.floor(Math.random() * 4) + 2;
                    if (percentage > 100) percentage = 100;
                    if (percentageSpan) {
                        percentageSpan.textContent = percentage + '%';
                    }
                    
                    // Update message at certain percentages
                    if (percentage >= 20 && msgIndex === 0) {
                        msgIndex = 1;
                        if (messageSpan) messageSpan.textContent = loadingMessages[1];
                    } else if (percentage >= 40 && msgIndex === 1) {
                        msgIndex = 2;
                        if (messageSpan) messageSpan.textContent = loadingMessages[2];
                    } else if (percentage >= 60 && msgIndex === 2) {
                        msgIndex = 3;
                        if (messageSpan) messageSpan.textContent = loadingMessages[3];
                    } else if (percentage >= 80 && msgIndex === 3) {
                        msgIndex = 4;
                        if (messageSpan) messageSpan.textContent = loadingMessages[4];
                    } else if (percentage >= 95 && msgIndex === 4) {
                        msgIndex = 5;
                        if (messageSpan) messageSpan.textContent = loadingMessages[5];
                    }
                } else {
                    clearInterval(percentageInterval);
                }
            }, 70);
            
            // Generate floating particles
            function createParticles() {
                const particlesContainer = document.getElementById('particles');
                if (!particlesContainer) return;
                
                const particleCount = window.innerWidth < 768 ? 20 : 40;
                
                for (let i = 0; i < particleCount; i++) {
                    const particle = document.createElement('div');
                    particle.classList.add('particle');
                    const size = Math.random() * 4 + 1;
                    particle.style.width = size + 'px';
                    particle.style.height = size + 'px';
                    particle.style.left = Math.random() * 100 + '%';
                    particle.style.animationDuration = Math.random() * 8 + 4 + 's';
                    particle.style.animationDelay = Math.random() * 5 + 's';
                    particle.style.opacity = Math.random() * 0.5 + 0.2;
                    particlesContainer.appendChild(particle);
                }
            }
            
            createParticles();
            
            const minDisplayTime = 2800;
            const startTime = Date.now();
            let resourcesLoaded = false;
            
            function redirectToHome() {
                clearInterval(percentageInterval);
                preloader.classList.add('fade-out');
                setTimeout(() => {
                    window.location.href = 'home.html';
                }, 800);
            }
            
            function checkAndRedirect() {
                const elapsed = Date.now() - startTime;
                if (resourcesLoaded && elapsed >= minDisplayTime) {
                    redirectToHome();
                } else if (resourcesLoaded) {
                    setTimeout(redirectToHome, minDisplayTime - elapsed);
                }
            }
            
            window.addEventListener('load', () => {
                resourcesLoaded = true;
                checkAndRedirect();
            });
            
            // Fallback: Force redirect after 5 seconds
            setTimeout(() => {
                if (preloader && !preloader.classList.contains('fade-out')) {
                    resourcesLoaded = true;
                    checkAndRedirect();
                }
            }, 5000);
            
            // Recalculate particle positions on resize
            let resizeTimeout;
            window.addEventListener('resize', function() {
                clearTimeout(resizeTimeout);
                resizeTimeout = setTimeout(() => {
                    const particlesContainer = document.getElementById('particles');
                    if (particlesContainer) {
                        particlesContainer.innerHTML = '';
                        createParticles();
                    }
                }, 200);
            });
        })();
    </script>

    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</body>
</html>
