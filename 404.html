<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>404 · Learning Path Not Found | Stackly Education</title>
  <!-- Inter font + Outfit for education feel -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <!-- Font Awesome for icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: radial-gradient(circle at 10% 20%, rgba(255,200,100,0.08), rgba(10,43,62,0.02)), 
                  linear-gradient(135deg, #f0f4fa 0%, #e6edf5 100%);
      font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 1.5rem;
      overflow-x: hidden;
      width: 100%;
      position: relative;
    }

    /* Animated Education Pattern Background - matching header style */
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: 
        radial-gradient(circle at 20% 30%, rgba(255, 200, 87, 0.06) 2px, transparent 2px),
        linear-gradient(rgba(10, 43, 62, 0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(10, 43, 62, 0.04) 1px, transparent 1px);
      background-size: 40px 40px, 40px 40px, 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    /* Glowing Orb Effect - warm gold glow matching header accent */
    body::after {
      content: '';
      position: fixed;
      top: 50%;
      left: 50%;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(255, 200, 87, 0.08) 0%, transparent 70%);
      transform: translate(-50%, -50%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      max-width: 550px;
      width: 100%;
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(4px);
      border-radius: 0px;
      padding: 3rem 2.5rem;
      text-align: center;
      box-shadow: 0 25px 50px -12px rgba(10, 43, 62, 0.15), 0 0 0 1px rgba(255, 200, 87, 0.3);
      border-left: 6px solid #ffc857;
      animation: fadeSlideUp 0.6s ease-out;
      position: relative;
      z-index: 1;
    }

    .container:hover {
      box-shadow: 0 30px 60px -12px rgba(10, 43, 62, 0.2), 0 0 0 1px rgba(255, 200, 87, 0.5);
      transition: all 0.3s ease;
    }

    /* Graduation Cap Icon - matching header gold */
    .education-icon {
      font-size: 4rem;
      color: #ffc857;
      margin-bottom: 16px;
      animation: softFloat 3s infinite ease-in-out;
      display: inline-block;
      filter: drop-shadow(0 0 12px rgba(255, 200, 87, 0.4));
    }

    .four04 {
      font-size: 96px;
      font-weight: 800;
      background: linear-gradient(135deg, #0a2b3e, #ffc857, #e6a017);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      line-height: 1;
      margin-bottom: 8px;
      letter-spacing: 4px;
      animation: softFloat 3s infinite ease-in-out;
      display: inline-block;
      text-shadow: 0 0 30px rgba(255, 200, 87, 0.2);
    }

    h2 {
      font-size: 28px;
      font-weight: 700;
      color: #0a2b3e;
      margin-bottom: 12px;
      opacity: 0;
      animation: fadeIn 0.5s ease-out forwards;
      animation-delay: 0.2s;
      font-family: 'Outfit', 'Inter', sans-serif;
    }

    p {
      font-size: 18px;
      color: #4a627a;
      margin-bottom: 32px;
      font-weight: 400;
      line-height: 1.5;
      opacity: 0;
      animation: fadeIn 0.5s ease-out forwards;
      animation-delay: 0.3s;
    }

    /* Status Badge - matching header style */
    .status-badge {
      display: inline-block;
      background: rgba(255, 200, 87, 0.12);
      padding: 6px 16px;
      border-radius: 0px;
      font-size: 0.75rem;
      font-weight: 600;
      color: #e6a017;
      margin-bottom: 20px;
      border: 1px solid rgba(255, 200, 87, 0.4);
      letter-spacing: 0.5px;
      opacity: 0;
      animation: fadeIn 0.5s ease-out forwards;
      animation-delay: 0.15s;
    }

    .button-group {
      display: flex;
      gap: 16px;
      justify-content: center;
      flex-wrap: wrap;
      opacity: 0;
      animation: fadeIn 0.5s ease-out forwards;
      animation-delay: 0.4s;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      text-decoration: none;
      font-size: 16px;
      font-weight: 600;
      padding: 14px 28px;
      border-radius: 0px;
      transition: all 0.25s ease;
      cursor: pointer;
      min-width: 180px;
      font-family: inherit;
    }

    .btn i {
      font-size: 14px;
      transition: transform 0.2s ease;
    }

    /* Home button - matches header getstarted button */
    .btn-home {
      background: #ffc857;
      color: #0a2b3e;
      border: none;
      box-shadow: 0 2px 6px rgba(0,0,0,0.15);
    }

    .btn-home:hover {
      background: #ffd966;
      transform: translateY(-2px);
      box-shadow: 0 6px 14px rgba(255, 200, 87, 0.35);
    }

    .btn-home:hover i {
      transform: translateX(-4px);
    }

    /* Previous button - matches header login button style */
    .btn-prev {
      background: rgba(255, 255, 255, 0.08);
      border: 1.5px solid rgba(255, 200, 87, 0.7);
      color: #FFE6B0;
      backdrop-filter: blur(4px);
    }

    .btn-prev:hover {
      background: #ffc857;
      color: #0a2b3e;
      border-color: #ffc857;
      transform: translateY(-2px);
    }

    .btn-prev:hover i {
      transform: translateX(-4px);
    }

    @keyframes fadeSlideUp {
      0% {
        opacity: 0;
        transform: translateY(20px);
      }
      100% {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeIn {
      0% { opacity: 0; }
      100% { opacity: 1; }
    }

    @keyframes softFloat {
      0%, 100% {
        transform: translateY(0);
      }
      50% {
        transform: translateY(-6px);
      }
    }

    /* ========== RESPONSIVE DESIGN - MATCHING HEADER BREAKPOINTS ========== */
    @media (max-width: 860px) {
      body {
        padding: 1rem;
      }
      
      .container {
        padding: 2.5rem 1.8rem;
        max-width: 90%;
      }
      
      .four04 {
        font-size: 80px;
      }

      .education-icon {
        font-size: 3.2rem;
      }

      h2 {
        font-size: 24px;
      }

      p {
        font-size: 15px;
        margin-bottom: 28px;
      }
      
      .button-group {
        flex-direction: row;
        gap: 14px;
      }
      
      .btn {
        padding: 12px 24px;
        font-size: 15px;
        min-width: 160px;
      }
    }

    @media (max-width: 550px) {
      body {
        padding: 0.8rem;
      }
      
      .container {
        padding: 2rem 1.2rem;
      }
      
      .four04 {
        font-size: 64px;
      }
      
      .education-icon {
        font-size: 2.8rem;
      }
      
      h2 {
        font-size: 22px;
      }
      
      p {
        font-size: 14px;
        margin-bottom: 24px;
      }
      
      .button-group {
        flex-direction: column;
        align-items: stretch;
        gap: 12px;
        width: 100%;
      }
      
      .btn {
        width: 100%;
        min-width: unset;
        padding: 12px 20px;
        font-size: 15px;
      }
      
      .status-badge {
        font-size: 0.7rem;
        padding: 5px 12px;
      }
    }

    @media (max-width: 480px) {
      .container {
        padding: 1.8rem 1rem;
      }
      
      .four04 {
        font-size: 52px;
      }
      
      .education-icon {
        font-size: 2.5rem;
      }
      
      h2 {
        font-size: 20px;
      }
      
      p {
        font-size: 13px;
        margin-bottom: 22px;
      }
      
      .btn {
        padding: 11px 18px;
        font-size: 14px;
      }
    }

    @media (max-width: 360px) {
      .container {
        padding: 1.5rem 0.9rem;
      }
      
      .four04 {
        font-size: 46px;
      }
      
      h2 {
        font-size: 18px;
      }
      
      p {
        font-size: 12px;
      }
      
      .btn {
        padding: 10px 16px;
        font-size: 13px;
      }
    }

    /* prevent horizontal movement - matching header */
    html, body {
      overflow-x: hidden;
      width: 100%;
      position: relative;
    }

    /* Remove default button outline - matching header */
    button:focus, a:focus {
      outline: none;
    }

    /* Custom scrollbar - matching header colors */
    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-track {
      background: #e6edf5;
    }

    ::-webkit-scrollbar-thumb {
      background: #ffc857;
      border-radius: 0px;
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Graduation Cap Icon - Education Symbol matching header gold -->
    <div class="education-icon">
      <i class="fas fa-graduation-cap"></i>
    </div>
    
    <!-- Status Badge -->
    <div class="status-badge">
      <i class="fas fa-compass" style="margin-right: 6px;"></i> LEARNING PATH · PAGE NOT FOUND
    </div>
    
    <!-- 404 with Education Glow -->
    <div class="four04">404</div>
    <h2>learning path not found</h2>
    <p>The page you're looking for seems to have wandered off. Don't worry — your learning journey continues here.</p>
    
    <!-- Only 2 buttons as requested -->
    <div class="button-group">
      <a href="index.html" class="btn btn-home">
        <i class="fas fa-home"></i> Back to Home
      </a>
      
      <a href="javascript:history.back()" class="btn btn-prev">
        <i class="fas fa-arrow-left"></i> Previous Page
      </a>
    </div>
  </div>

  <script>
    (function() {
      // Console education message matching header style
      console.log('%c🎓 Stackly Education — 404 Page | Learning Path Not Found', 'color: #ffc857; font-size: 14px; font-weight: bold;');
      console.log('%cThe page you requested could not be located. Returning to safe navigation.', 'color: #0a2b3e; font-size: 12px;');
      
      // Add keyboard shortcut for going back (Alt + Left Arrow)
      document.addEventListener('keydown', function(e) {
        if (e.altKey && e.key === 'ArrowLeft') {
          e.preventDefault();
          window.history.back();
        }
      });
      
      // Fun easter egg: click the graduation cap 3 times for a surprise
      let capClickCount = 0;
      const capIcon = document.querySelector('.education-icon');
      if (capIcon) {
        capIcon.style.cursor = 'pointer';
        capIcon.addEventListener('click', function() {
          capClickCount++;
          if (capClickCount === 3) {
            capClickCount = 0;
            const messages = [
              "✨ Keep learning! Every detour is a new discovery ✨",
              "📖 Did you know? Our library has 1000+ learning resources! 📖",
              "🎯 Tip: Check out our Programs page for exciting courses 🎯",
              "🌟 You're on the right path to success! 🌟",
              "💡 Stackly tip: Use the navigation menu to explore everything 💡"
            ];
            const randomMsg = messages[Math.floor(Math.random() * messages.length)];
            alert('🎓 ' + randomMsg);
          }
          // reset after 2 seconds
          setTimeout(() => { capClickCount = 0; }, 2000);
        });
      }
    })();
  </script>
</body>
</html>
